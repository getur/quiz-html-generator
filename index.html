<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Multi-Tipo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D1221;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading {
      color: #8A92A8;
      font-size: 1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <iframe src="assets/template.html" title="Quiz" onload="this.style.opacity='1'" style="opacity:0;transition:opacity .3s"></iframe>
</body>
</html>
